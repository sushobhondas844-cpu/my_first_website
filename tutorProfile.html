<!DOCTYPE html>
<html>
<head>
    <title>Tutor Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="header">
        <a href="index.html" class="brand" style="text-decoration: none;">Tutor Me</a>
        <div class="nav">
            <a href="dashboard.html" id="nav-dashboard">Dashboard</a>
            <a href="#" id="nav-logout" onclick="handleLogout()">Logout</a>
        </div>
    </div>

    <div class="profile-container">
        <div class="cover-photo"></div>
        <div class="profile-header-content">
            <img src="" id="profile-pic-display" class="profile-pic" alt="Profile Picture" style="display: none;">
            <div id="profile-pic-placeholder" class="profile-pic" style="background: #ccc; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">No Pic</div>
            
            <div class="profile-info">
                <h2 id="profile-name">Loading Name</h2>
                <p style="color: #555; font-style: italic; margin: 5px 0;" id="profile-occupation">Loading Occupation</p>
                <p><b id="profile-subject">Loading Subject</b> • <span id="profile-location">Loading Location</span></p>
                <p style="font-size: 14px; margin-bottom: 15px;">🎓 <span id="profile-education">Loading Education</span></p>
                <p id="profile-rate" style="color: #0056b3; font-weight: bold; font-size: 18px;">Loading Rate</p>
                <br>
                
                <div style="display: flex; gap: 10px;">
                    <button class="btn full-width" onclick="handleTutorRequest()">Request Tutor</button>
                </div>
            </div>
        </div>

        <div class="profile-bio-section">
            <h3>About Me</h3>
            <p id="profile-bio">Loading biography data</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
